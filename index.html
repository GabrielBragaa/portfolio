<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="initial-scale= 1">
        <link rel="stylesheet" href="style.css">
        <title>Instagram</title> 
    </head>
    <body>
        <div class="instagram_wrapper">
            <div class="instagram_phone">
                <img src="img/instagram-celular.png" alt="Celular">
            </div>
            <div class="instagram_continue">
                <div class="group">
                    <img src="./img/instagram-logo.png" alt="Logo do Instagram" class="instagram_logo">
                    <div class="profile_photo">
                        <img src="./img/perfil-instagram.jpg" alt="Foto do Perfil do Instagram">
                    </div>
                    <a href="" class="instagram_login">Continue como gabrielnargas</a>
                    <a href="" class="instagram_logout">Remover Conta</a>
                </div>
                <div class="group">
                    <p class="not_account">Não é gabrielnargas?</p>
                    <p class="not_account">
                        <span class="link_blue">Alternar Contas</span>
                        ou
                        <span class="link_blue">Inscreva-se</span>
                    </p>
                </div>
                <div class="get_the_app">
                    <p class="get_app">Baixe o aplicativo</p>
                    <div class="download">
                        <a href="" class="app_download"></a>
                        <a href="" class="app_download"></a>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
